[defaults]
inventory = ./inventory/
roles_path = ./roles
remote_tmp = /tmp/.ansible/tmp
host_key_checking = False
retry_files_enabled = False
interpreter_python = auto_silent

#[privilege_escalation]
#become = True
#become_method = sudo
#become_user = root

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining = True
