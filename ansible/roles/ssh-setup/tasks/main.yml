---
# SSH Setup Role - Configure SSH keys and connectivity between all nodes

- name: Copy shared SSH private key
  copy:
    src: "{{ ssh_shared_key_path }}/id_rsa"
    dest: "{{ ssh_key_path }}"
    remote_src: false
    mode: "0600"
    owner: root
    group: root

- name: Copy shared SSH public key
  copy:
    src: "{{ ssh_shared_key_path }}/id_rsa.pub"
    dest: "{{ ssh_pub_key_path }}"
    remote_src: false
    mode: "0644"
    owner: root
    group: root

- name: Set up authorized_keys from shared public key
  authorized_key:
    user: root
    state: present
    key: "{{ lookup('file', ssh_shared_key_path + '/id_rsa.pub') }}"

- name: Configure SSH client for all vault nodes
  template:
    src: ssh_config.j2
    dest: /root/.ssh/config
    mode: "0600"
    owner: root
    group: root

- name: Add all vault nodes to /etc/hosts
  shell: |
    grep -q "{{ item.ip }}.*{{ item.name }}" /etc/hosts || echo "{{ item.ip }}  {{ item.name }}" >> /etc/hosts
  loop: "{{ all_node_ips }}"
  changed_when: false

- name: Test SSH connectivity to all nodes
  command: "ssh -o BatchMode=yes -o ConnectTimeout=5 {{ item.name }} hostname"
  loop: "{{ all_node_ips }}"
  register: ssh_test
  changed_when: false
  retries: 3
  delay: 2
  until: ssh_test.rc == 0
