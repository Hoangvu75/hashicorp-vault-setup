---
apiVersion: v1
kind: Secret
metadata:
  name: vault-approle-secret
type: Opaque
data:
  id: "dGVzdC1zZWNyZXQtaWQ=" # base64 của "test-secret-id"
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: local-vault
spec:
  address: "http://host.docker.internal:4510"
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: approle-auth
spec:
  method: appRole
  mount: approle
  vaultConnectionRef: local-vault
  appRole:
    roleId: "test-role-id"
    secretRef: "vault-approle-secret"
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: myapp-secret-sync
spec:
  type: kv-v2
  mount: secret
  path: myapp
  refreshAfter: 60s
  destination:
    name: myapp-k8s-secret
    create: true
  vaultAuthRef: approle-auth
