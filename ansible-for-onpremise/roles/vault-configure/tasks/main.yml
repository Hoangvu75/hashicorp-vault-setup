---
# Vault Configure Role - Configure Vault for HA with Raft storage

- name: Generate Vault configuration
  template:
    src: vault.hcl.j2
    dest: "{{ vault_config_dir }}/vault.hcl"
    owner: "{{ vault_user }}"
    group: "{{ vault_group }}"
    mode: "0640"
  notify: Restart vault

- name: Ensure Vault data directory has correct ownership
  file:
    path: "{{ vault_data_dir }}"
    state: directory
    owner: "{{ vault_user }}"
    group: "{{ vault_group }}"
    mode: "0750"
    recurse: true

- name: Start Vault server
  shell: |
    pkill vault || true
    sleep 1
    nohup vault server -config={{ vault_config_dir }}/vault.hcl > {{ vault_log_dir }}/vault.log 2>&1 &
    sleep 3
  become: true

- name: Wait for Vault to be ready
  uri:
    url: "http://127.0.0.1:{{ vault_api_port }}/v1/sys/health"
    method: GET
    status_code: [200, 429, 472, 473, 501]
  register: vault_health
  retries: 12
  delay: 5
  until: vault_health.status in [200, 429, 472, 473, 501]

- name: Display Vault health status
  debug:
    msg: "Vault on {{ inventory_hostname }} is responding with status {{ vault_health.status }}"
